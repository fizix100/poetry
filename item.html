<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>友林诗文集 - 正文</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="site-nav">
    <div class="site-nav-inner">
      <a href="index.html" class="logo">友林诗文集</a>
      <a href="about.html">关于</a>
    </div>
  </nav>
  <div class="container">
    <div class="list-header">
      <a href="index.html" class="back-link">← 返回首页</a>
    </div>
    <article id="article">
      <div class="empty-state">加载中…</div>
    </article>
  </div>
  <footer class="site-footer">© 友林诗文集</footer>
  <script src="js/app.js"></script>
  <script>
    (function () {
      const id = Youlin.getIdFromQuery();
      const articleEl = document.getElementById('article');

      function escapeHtml(s) {
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      function copyText(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function () {
            var btn = document.getElementById('copy-btn');
            if (btn) { btn.textContent = '已复制'; setTimeout(function () { btn.textContent = '复制'; }, 1500); }
          });
        } else {
          var ta = document.createElement('textarea');
          ta.value = text;
          ta.style.position = 'fixed'; ta.style.left = '-9999px';
          document.body.appendChild(ta);
          ta.select();
          try {
            document.execCommand('copy');
            var btn = document.getElementById('copy-btn');
            if (btn) { btn.textContent = '已复制'; setTimeout(function () { btn.textContent = '复制'; }, 1500); }
          } catch (e) {}
          document.body.removeChild(ta);
        }
      }

      if (!id) {
        articleEl.innerHTML = '<div class="empty-state">未指定篇章</div>';
        return;
      }

      Youlin.loadData().then(function (data) {
        const item = data.items.find(function (i) { return i.id === id; });
        if (!item) {
          articleEl.innerHTML = '<div class="empty-state">未找到该篇</div>';
          return;
        }
        const cat = data.categories.find(function (c) { return c.id === item.categoryId; });
        const backLink = '<a href="list.html?category=' + encodeURIComponent(item.categoryId) + '" class="back-link">← 返回「' + escapeHtml(cat ? cat.name : '') + '」</a>';
        const dateStr = item.date ? item.date.replace(/\./g, '.') : '';
        const fullText = item.title + (dateStr ? '\n' + dateStr : '') + '\n\n' + (item.content || '');
        articleEl.innerHTML =
          '<div class="list-header">' + backLink + '</div>' +
          '<header class="article-header">' +
          '<h1 class="article-title">' + escapeHtml(item.title) + '</h1>' +
          (dateStr ? '<p class="article-meta">' + escapeHtml(dateStr) + '</p>' : '') +
          '</header>' +
          '<div class="article-body">' + escapeHtml(item.content || '') + '</div>' +
          '<div class="article-actions">' +
          '<button type="button" id="copy-btn" class="btn">复制</button>' +
          '</div>';
        document.title = item.title + ' - 友林诗文集';
        document.getElementById('copy-btn').onclick = function () { copyText(fullText); };
      }).catch(function () {
        articleEl.innerHTML = '<div class="empty-state">无法加载数据</div>';
      });
    })();
  </script>
</body>
</html>
