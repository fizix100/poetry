<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>友林诗文集</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="site-nav">
    <div class="site-nav-inner">
      <div class="site-nav-scroll" id="nav-categories">
        <a href="#" class="nav-cat active" data-category="">全部</a>
        <a href="#" class="nav-cat" data-category="zhiqin">至亲乡情</a>
        <a href="#" class="nav-cat" data-category="siji">四季更迭</a>
        <a href="#" class="nav-cat" data-category="yongwu">咏物感怀</a>
        <a href="#" class="nav-cat" data-category="jishan">寄情山水</a>
        <a href="#" class="nav-cat" data-category="youguo">忧国忧民</a>
        <a href="#" class="nav-cat" data-category="sanwen">散文</a>
        <div class="nav-year-wrap">
          <label class="nav-year-label">年份</label>
          <select class="nav-year-select" id="year-select" aria-label="按年份筛选">
            <option value="">全部年份</option>
          </select>
        </div>
      </div>
      <a href="about.html" class="nav-about">关于</a>
    </div>
  </nav>
  <div class="home-layout">
    <main class="home-main">
      <ul class="home-poem-list" id="poem-list"></ul>
      <button type="button" class="home-load-more" id="load-more" style="display: none;">加载更多</button>
      <p class="home-empty" id="empty-msg" style="display: none;">暂无内容</p>
      <footer class="site-footer" style="margin-top: 32px;">© 友林诗文集</footer>
    </main>
  </div>
  <script src="js/app.js"></script>
  <script>
    (function () {
      const PAGE_SIZE = 20;
      let data = null;
      let currentCategory = '';
      let selectedYear = '';
      let page = 1;
      let filteredItems = [];

      function escapeHtml(s) {
        if (s == null) return '';
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      function getFiltered() {
        if (!data) return [];
        var raw = !currentCategory ? data.items : data.items.filter(function (i) { return i.categoryId === currentCategory; });
        if (selectedYear) {
          raw = raw.filter(function (i) { return i.date && String(i.date).indexOf(selectedYear) === 0; });
        }
        return Youlin.sortByTime(raw, 'asc');
      }

      function getYears() {
        if (!data) return [];
        var years = {};
        data.items.forEach(function (i) {
          if (i.date && i.date.length >= 4) {
            years[i.date.substring(0, 4)] = true;
          }
        });
        return Object.keys(years).sort(function (a, b) { return Number(b) - Number(a); });
      }

      function renderNavCategories() {
        if (!data) return;
        var total = data.items.length;
        var cats = document.querySelectorAll('#nav-categories .nav-cat');
        cats.forEach(function (a) {
          var id = a.getAttribute('data-category') || '';
          a.classList.toggle('active', currentCategory === id);
          var countEl = a.querySelector('.nav-cat-count');
          if (countEl) countEl.remove();
          var count = id ? data.items.filter(function (i) { return i.categoryId === id; }).length : total;
          var span = document.createElement('span');
          span.className = 'nav-cat-count';
          span.textContent = ' ' + count + ' 篇';
          a.appendChild(span);
        });
      }

      function bindNavCategories() {
        document.querySelectorAll('#nav-categories .nav-cat').forEach(function (link) {
          link.addEventListener('click', function (e) {
            e.preventDefault();
            currentCategory = link.getAttribute('data-category') || '';
            page = 1;
            filteredItems = getFiltered();
            renderNavCategories();
            renderList(true);
          });
        });
      }

      function renderYearSelect() {
        var sel = document.getElementById('year-select');
        if (!sel) return;
        var years = getYears();
        sel.innerHTML = '<option value="">全部年份</option>' +
          years.map(function (y) {
            return '<option value="' + escapeHtml(y) + '"' + (selectedYear === y ? ' selected' : '') + '>' + escapeHtml(y) + ' 年</option>';
          }).join('');
        sel.addEventListener('change', function () {
          selectedYear = (sel.value || '').trim();
          page = 1;
          filteredItems = getFiltered();
          renderNavCategories();
          renderList(true);
        });
      }

      function renderList(reset) {
        const listEl = document.getElementById('poem-list');
        const loadBtn = document.getElementById('load-more');
        const emptyEl = document.getElementById('empty-msg');
        if (reset) page = 1;
        filteredItems = getFiltered();
        const toShow = filteredItems.slice(0, page * PAGE_SIZE);
        const hasMore = toShow.length < filteredItems.length;

        if (filteredItems.length === 0) {
          listEl.innerHTML = '';
          loadBtn.style.display = 'none';
          emptyEl.style.display = 'block';
          return;
        }
        emptyEl.style.display = 'none';

        listEl.innerHTML = toShow.map(function (item) {
          const dateStr = item.date ? item.date.replace(/\./g, '.') : '';
          return '<li class="home-poem-card">' +
            '<h2 class="card-title">' + escapeHtml(item.title) + '</h2>' +
            (dateStr ? '<p class="card-meta">' + escapeHtml(dateStr) + '</p>' : '') +
            '<div class="card-body">' + escapeHtml(item.content || '') + '</div>' +
            '</li>';
        }).join('');

        if (hasMore) {
          loadBtn.style.display = 'block';
          loadBtn.disabled = false;
          loadBtn.textContent = '加载更多（已显示 ' + toShow.length + ' / ' + filteredItems.length + '）';
        } else {
          loadBtn.style.display = 'none';
        }
      }

      function loadMore() {
        page += 1;
        renderList(false);
      }

      function initFromUrl() {
        var params = new URLSearchParams(location.search);
        var c = params.get('category') || '';
        if (c && data && data.categories.some(function (x) { return x.id === c; })) {
          currentCategory = c;
        }
      }

      Youlin.loadData().then(function (d) {
        data = d;
        currentCategory = '';
        selectedYear = '';
        page = 1;
        initFromUrl();
        filteredItems = getFiltered();
        renderNavCategories();
        bindNavCategories();
        renderYearSelect();
        renderList(true);
        document.getElementById('load-more').addEventListener('click', loadMore);
      }).catch(function () {
        document.getElementById('poem-list').innerHTML = '';
        document.getElementById('empty-msg').style.display = 'block';
        document.getElementById('empty-msg').textContent = '无法加载数据';
      });
    })();
  </script>
</body>
</html>
